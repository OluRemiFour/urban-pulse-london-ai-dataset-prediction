services:
  - type: web
    name: urban-pulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false # Set this in the Render Dashboard
      - key: DATABASE_NAME
        value: urban_pulse
      - key: API_TITLE
        value: "Urban Pulse API (Production)"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: 8000
      - key: ZILLOW_DATA_PATH
        value: ./data/zillow_properties_listing.csv
